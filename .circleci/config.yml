version: 2.1

parameters:
  GHA_Action:
    type: string
    default: ""
  should_release:
    type: boolean
    default: false

orbs:
  codecov: codecov/codecov@5.4.3

executors:
  base:
    docker:
      - image: docker.io/playerui/bazel-docker-slim:9
    working_directory: ~/devtools
    resource_class: medium
    environment:
      TZ: "/usr/share/zoneinfo/America/Los_Angeles"

commands:
  auto_shipit:
    description: Perform Auto shipit
    steps:
      - attach_workspace:
          at: ~/devtools

      - restore_cache:
          keys:
            - devtools-{{ .Branch }}-{{ .Revision }}
            - devtools-{{ .Branch }}
            - devtools-main

      - run: echo "//registry.npmjs.com/:_authToken=$NPM_TOKEN" >> ~/.npmrc
      - run: echo -e $GPG_KEY | gpg --import --batch
      - run: |
          source ~/.bashrc
          npx auto shipit --only-graduate-with-release-label -vv
  check_branch_status:
    description: "Check if the branch is clean after the build"
    steps:
      - run:
          name: Check branch status
          command: |
            if [[ -n "$(git status --porcelain)" ]]; then 
              echo "Error: The branch is not clean after the build. Please run the build locally and commit any changes."
              exit 1
            else
              echo "The branch is clean after the build."
            fi

jobs:
  setup:
    executor: base
    steps:
      - checkout

      - restore_cache:
          keys:
            - devtools-{ { checksum "package.json" }}

      - persist_to_workspace:
          root: .
          paths:
            - .

  bazelrc:
    executor: base
    steps:
      - attach_workspace:
          at: ~/devtools
      - run: |
          echo "build --remote_header=x-buildbuddy-api-key=${BUILDBUDDY_API_KEY}" >> .bazelrc.local
          echo "test --remote_header=x-buildbuddy-api-key=${BUILDBUDDY_API_KEY}" >> .bazelrc.local
          echo "coverage --remote_header=x-buildbuddy-api-key=${BUILDBUDDY_API_KEY}" >> .bazelrc.local
      - persist_to_workspace:
          root: .
          paths:
            - .

  build_core:
    executor: base
    steps:
      - attach_workspace:
          at: ~/devtools

      - run: bazel build --config=ci -- $(bazel query "attr(name, 'native_bundle', //...)" --output label 2>/dev/null | tr '\n' ' ')

      - save_cache:
          paths:
            - node_modules
          key: devtools-{{ checksum "package.json" }}

      - persist_to_workspace:
          root: .
          paths:
            - .
      - check_branch_status

  test_js:
    executor: base
    steps:
      - attach_workspace:
          at: ~/devtools

      - restore_cache:
          keys:
            - devtools-{{ .Branch }}-{{ .Revision }}
            - devtools-{{ .Branch }}
            - devtools-main

      - run: |
          bazel coverage --config=ci -- $(bazel query "kind(js_test, //...)" --output label 2>/dev/null | tr '\n' ' ')

      - codecov/upload:
          files: ./bazel-out/_coverage/_js_coverage_report.dat

  test_ios:
    executor: base
    steps:
      - attach_workspace:
          at: ~/devtools
          
      - run: bazel coverage --config=ci -- $(bazel query "kind('ios_unit_test|ios_ui_test', //...)")
      
      - codecov/upload:
          files: ./bazel-out/_coverage/_ios_coverage_report.dat

  maybe_release:
    executor: base
    steps:
      - run: echo "Should I release? (<< pipeline.parameters.should_release >>)"
      - when:
          condition: << pipeline.parameters.should_release >>
          steps:
            - auto_shipit

  release:
    executor: base
    steps:
      - auto_shipit

workflows:
  build_and_test_pr:
    jobs:
      - setup:
          filters:
            branches:
              ignore:
                - main
                - /version-.*/
            tags:
              ignore: /.*/

      - bazelrc:
          filters:
            branches:
              ignore: /pull\/.*/
          context:
            - BuildTools
          requires:
            - setup

      - build_core:
          name: build-trunk
          filters:
            branches:
              ignore:
                - /pull\/.*/
          requires:
            - bazelrc

      - build_core:
          name: build-fork
          filters:
            branches:
              only:
                - /pull\/.*/
          requires:
            - setup

      # - maybe_release:
      #     filters:
      #       branches:
      #         ignore:
      #           - /pull\/.*/
      #     context:
      #       - Publish
      #     requires:
      #       - build-trunk

      - test_js:
          name: test-trunk
          filters:
            branches:
              ignore:
                - /pull\/.*/
          requires:
            - build-trunk

      - test_js:
          name: test-fork
          filters:
            branches:
              only:
                - /pull\/.*./
          requires:
            - build-fork

      - test_ios:
          name: test-trunk
          filters:
            branches:
              ignore:
                - /pull\/.*/
          requires:
            - build-trunk
      
      - test_ios:
          name: test-fork
          filters:
            branches:
              only:
                - /pull\/.*/
          requires:
            - build-fork

  build_and_test_main:
    when:
      equal: ["", << pipeline.parameters.GHA_Action >>]
    jobs:
      - setup:
          filters:
            branches:
              only:
                - main
                - /version-.*/
      - bazelrc:
          context:
            - BuildTools
          requires:
            - setup

      - build_core:
          requires:
            - bazelrc

      - test_js:
          requires:
            - build_core

      - test_ios:
          requires:
            - build_core

      # - release:
      #     context:
      #       - Publish
      #     requires:
      #       - test

  full_release:
    when:
      equal: [release, << pipeline.parameters.GHA_Action >>]
    jobs:
      - setup

      - build_core:
          requires:
            - setup

      - bazelrc:
          context:
            - BuildTools
          requires:
            - setup

      - test_js:
          requires:
            - bazelrc

      - test_ios:
          requires:
            - bazelrc

      # - release:
      #     context:
      #       - Publish
      #     requires:
      #       - test