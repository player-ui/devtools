version: 2.1

executors:
  base:
    docker:
      - image: docker.io/playerui/bazel-docker
    working_directory: ~/devtools
    resource_class: large
    environment:
      TZ: "/usr/share/zoneinfo/America/Los_Angeles"

jobs:
  install:
    executor: base
    steps:
      - checkout
      - persist_to_workspace:
          root: .
          paths:
            - .

  test:
    executor: base
    steps:
      - attach_workspace:
          at: ~/devtools
      - run:
          name: Test
          command: bazel test //...

  # TODO: Add release phase

workflows:
  version: 2
  build_and_test:
    jobs:
      - install

      - test:
          requires:
            - install